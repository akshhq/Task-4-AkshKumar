<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notices – Student Portal</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="navbar">
    <span class="nav-brand">📚 StudentHub</span>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Dashboard</a></li>
      <li><a href="timetable.html">Timetable</a></li>
      <li><a href="assignments.html">Assignments</a></li>
      <li><a href="notices.html">Notices</a></li>
    </ul>
    <button class="dark-toggle" id="darkToggle" onclick="toggleDark()">🌙 Dark Mode</button>
    <button class="nav-toggle" id="navToggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <main class="page">

    <div class="page-header">
      <h1>Notices</h1>
      <p>Post and view notices from the database</p>
    </div>

    <!-- Add Notice Form -->
    <div class="form-card">
      <h2>➕ Post New Notice</h2>
      <form id="noticeForm">
        <div class="form-row">
          <input type="text" id="title"       placeholder="Notice Title"       required />
          <input type="text" id="description" placeholder="Description"        required />
          <button type="submit" class="btn btn-primary">Post Notice</button>
        </div>
      </form>
      <p id="formMsg" style="margin-top:10px; font-size:0.85rem;"></p>
    </div>

    <!-- Notice Cards -->
    <div class="cards" style="flex-direction:column;" id="noticesContainer">
      <p class="state-msg">⏳ Loading notices...</p>
    </div>

  </main>

  <script src="js/notices.js"></script>
</body>
</html>
